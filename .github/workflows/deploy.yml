        \n"
      working-directory: infra
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build and push Docker image
      run: 'IMAGE="${ECR_URL}:${{ github.sha }}"

        docker build -t "${IMAGE}" .

