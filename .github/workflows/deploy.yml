    - name: Get ALB endpoint and health check
      run: "CLUSTER_NAME=\"${{ secrets.PROJECT_NAME }}-eks\"\naws eks update-kubeconfig\
        \ --region us-east-1 --name \"${CLUSTER_NAME}\"\necho \"Waiting for ALB DNS\
        \ name...\"\nALB_HOST=\"\"\nfor i in $(seq 1 20); do\n  ALB_HOST=$(kubectl\
        \ get ingress go-gin-app -n go-gin-app \\\n    -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'\
        \ 2>/dev/null || true)\n  if [ -n \"$ALB_HOST\" ]; then\n    echo \"ALB ready:\
        \ ${ALB_HOST}\"\n    break\n  fi\n  echo \"Attempt ${i}/20 \u2014 waiting\
        \ 15s...\"\n  sleep 15\ndone\nif [ -z \"$ALB_HOST\" ]; then\n  echo \"ERROR:\
        \ ALB hostname not available after 5 minutes\"\n  exit 1\nfi\nURL=\"http://${ALB_HOST}/health\"\
        \necho \"Checking: ${URL}\"\ncurl --fail --retry 12 --retry-delay 15 --retry-all-errors\
        \ \\\n  --connect-timeout 10 --max-time 30 \"${URL}\"\necho \"\"\necho \"\
        Health check passed!\"\n"
