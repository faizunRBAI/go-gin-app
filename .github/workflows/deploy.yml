        \ >> \"$GITHUB_OUTPUT\"\necho \"ecr_url=${ECR_URL}\" >> \"$GITHUB_OUTPUT\"\
        \necho \"alb_role_arn=${ALB_ROLE_ARN}\" >> \"$GITHUB_OUTPUT\"\n"
      working-directory: infra
    - name: Update kubeconfig
      run: "aws eks update-kubeconfig \\\n  --region us-east-1 \\\n  --name \"${{\
        \ steps.tf_out.outputs.cluster_name }}\"\n"
    - name: Install aws-load-balancer-controller
      run: "helm repo add eks https://aws.github.io/eks-charts\nhelm repo update\n\
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller\
        \ \\\n  --namespace kube-system \\\n  --set clusterName=\"${{ steps.tf_out.outputs.cluster_name\
        \ }}\" \\\n  --set serviceAccount.create=true \\\n  --set serviceAccount.name=aws-load-balancer-controller\
        \ \\\n  --set serviceAccount.annotations.\"eks\\.amazonaws\\.com/role-arn\"\
        =\"${{ steps.tf_out.outputs.alb_role_arn }}\" \\\n  --wait --timeout 5m\n"
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Deploy Kubernetes manifests
      run: 'IMAGE="${ECR_URL}:${{ github.sha }}"

        kubectl apply -f k8s/namespace.yaml

        kubectl apply -f k8s/serviceaccount.yaml

        sed "s|REGISTRY_PLACEHOLDER/go-gin-app-app:latest|${IMAGE}|g" k8s/deployment.yaml
        | kubectl apply -f -

        kubectl rollout status deployment/go-gin-app -n go-gin-app --timeout=180s

        '
      env:
        ECR_URL: ${{ steps.tf_out.outputs.ecr_url }}
  verify:
