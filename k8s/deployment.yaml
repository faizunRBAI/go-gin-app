apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gin-app
  namespace: go-gin-app
  labels:
    app.kubernetes.io/name: go-gin-app
    app.kubernetes.io/managed-by: udap
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-gin-app
  template:
    metadata:
      labels:
        app: go-gin-app
    spec:
      serviceAccountName: go-gin-app
      containers:
        - name: go-gin-app
          image: REGISTRY_PLACEHOLDER/go-gin-app-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: GIN_MODE
              value: "release"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: go-gin-app
  namespace: go-gin-app
  labels:
    app.kubernetes.io/name: go-gin-app
    app.kubernetes.io/managed-by: udap
spec:
  type: ClusterIP
  selector:
    app: go-gin-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-gin-app
  namespace: go-gin-app
  labels:
    app.kubernetes.io/name: go-gin-app
    app.kubernetes.io/managed-by: udap
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-gin-app
                port:
                  number: 80
