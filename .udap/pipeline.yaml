version: 1
name: go-gin-app
vcs: github

rollback:
  strategy: manual

stages:
  - id: lint
    kind: lint
    timeout_minutes: 10
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet
        run: go vet ./...
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt'd: $unformatted"
            exit 1
          fi

  - id: build_push
    kind: build_push
    needs: [lint]
    timeout_minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binary (smoke test)
        run: go build -o /dev/null .
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set image tag
        id: image_tag
        run: |
          ECR_REGISTRY="${{ steps.ecr_login.outputs.registry }}"
          IMAGE="${ECR_REGISTRY}/${{ secrets.PROJECT_NAME }}-app:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        run: |
          docker build -t "${{ steps.image_tag.outputs.image }}" .
          docker push "${{ steps.image_tag.outputs.image }}"

  - id: provision
    kind: provision
    needs: [build_push]
    timeout_minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project: ${{ secrets.PROJECT_NAME }}
      TF_VAR_region: us-east-1
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        working-directory: infra
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
      - name: Terraform validate
        working-directory: infra
        run: terraform validate
      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project: ${{ secrets.PROJECT_NAME }}
      TF_VAR_region: us-east-1
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Read Terraform outputs
        id: tf_out
        working-directory: infra
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          ECR_URL=$(terraform output -raw ecr_repository_url)
          ALB_ROLE_ARN=$(terraform output -raw alb_controller_role_arn)
          echo "cluster_name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
          echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"
          echo "alb_role_arn=${ALB_ROLE_ARN}" >> "$GITHUB_OUTPUT"
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name "${{ steps.tf_out.outputs.cluster_name }}"
      - name: Install aws-load-balancer-controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="${{ steps.tf_out.outputs.cluster_name }}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ steps.tf_out.outputs.alb_role_arn }}" \
            --wait --timeout 5m
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Deploy Kubernetes manifests
        run: |
          ECR_URL="${{ steps.tf_out.outputs.ecr_url }}"
          IMAGE="${ECR_URL}:${{ github.sha }}"
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          sed "s|REGISTRY_PLACEHOLDER/go-gin-app-app:latest|${IMAGE}|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/go-gin-app -n go-gin-app --timeout=180s

  - id: verify
    kind: verify
    needs: [configure]
    timeout_minutes: 15
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Get ALB endpoint
        id: get_alb
        run: |
          CLUSTER_NAME="${{ secrets.PROJECT_NAME }}-eks"
          aws eks update-kubeconfig --region us-east-1 --name "${CLUSTER_NAME}"
          echo "Waiting for ALB DNS name..."
          for i in $(seq 1 20); do
            ALB_HOST=$(kubectl get ingress go-gin-app -n go-gin-app \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ALB_HOST" ]; then
              echo "alb_host=${ALB_HOST}" >> "$GITHUB_OUTPUT"
              echo "ALB ready: ${ALB_HOST}"
              break
            fi
            echo "Attempt ${i}/20 — waiting 15s..."
            sleep 15
          done
          if [ -z "$ALB_HOST" ]; then
            echo "ERROR: ALB hostname not available after 5 minutes"
            exit 1
          fi
      - name: Health check with retries
        run: |
          URL="http://${{ steps.get_alb.outputs.alb_host }}/health"
          echo "Checking: ${URL}"
          curl --fail --retry 12 --retry-delay 15 --retry-all-errors \
            --connect-timeout 10 --max-time 30 "${URL}"
          echo ""
          echo "Health check passed!"
